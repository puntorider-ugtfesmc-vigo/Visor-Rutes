<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Rutas</title>
    <!-- Carga de Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carga de la biblioteca Leaflet para el mapa y el motor de enrutamiento -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>
<body class="h-screen w-full flex flex-col md:flex-row">
    
    <!-- Panel lateral para la lista -->
    <div class="w-full md:w-1/3 bg-gray-50 border-r border-gray-200 overflow-y-auto h-1/3 md:h-full" id="sidebar">
        <div class="p-4 bg-white border-b sticky top-0 shadow-sm z-10">
            <h1 class="text-lg font-bold text-gray-800">Rutas programadas</h1>
            <p class="text-sm text-gray-500">Selecciona una ruta para trazar el recorrido en coche</p>
        </div>
        <ul id="lista-rutas" class="divide-y divide-gray-200">
            <!-- Los elementos se insertan mediante JS -->
        </ul>
    </div>

    <!-- Contenedor del mapa -->
    <div class="w-full md:w-2/3 h-2/3 md:h-full z-0" id="mapa"></div>

    <script>
        // Inicialización del mapa base
        const mapa = L.map('mapa').setView([40.4168, -3.7038], 6);

        // Servidor de mapas CartoDB para evitar bloqueos
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(mapa);

        // Matriz de datos con las coordenadas validadas y sobreescritas
        const rutas = [
            { origen: "Alcalá de Guadaíra", destino: "Sevilla", coordOrigen: [37.339771, -5.840840], coordDestino: [37.388630, -5.995340], distancia: 20.7014 },
            { origen: "Azuqueca de Henares", destino: "Guadalajara", coordOrigen: [40.564500, -3.261200], coordDestino: [40.632700, -3.164100], distancia: 15.5325 },
            { origen: "Calafell", destino: "Vilanova i la Geltrú", coordOrigen: [41.200300, 1.568400], coordDestino: [41.224199, 1.725633], distancia: 20.9663 },
            { origen: "Candelaria", destino: "Tenerife (Santa Cruz)", coordOrigen: [28.350800, -16.369200], coordDestino: [28.468200, -16.251500], distancia: 21.3877 },
            { origen: "Castelldefels", destino: "Barcelona", coordOrigen: [41.280400, 1.977400], coordDestino: [41.382500, 2.177100], distancia: 24.6958 },
            { origen: "Castelldefels", destino: "Sitges", coordOrigen: [41.280400, 1.977400], coordDestino: [41.234100, 1.811600], distancia: 20.3360 },
            { origen: "Irun", destino: "San Sebastian", coordOrigen: [43.338318, -1.788810], coordDestino: [43.322422, -1.983889], distancia: 19.5175 },
            { origen: "Mijas", destino: "Fuengirola", coordOrigen: [36.595450, -4.636650], coordDestino: [36.541400, -4.624700], distancia: 13.5528 },
            { origen: "Torredembarra", destino: "Tarragona", coordOrigen: [41.144400, 1.396200], coordDestino: [41.114700, 1.249200], distancia: 16.0507 },
            { origen: "Massamagrell", destino: "Valencia", coordOrigen: [39.570400, -0.330210], coordDestino: [39.470000, -0.376400], distancia: 17.0777 },
            { origen: "Pobla de Farnals", destino: "Valencia", coordOrigen: [39.578400, -0.325900], coordDestino: [39.470000, -0.376400], distancia: 17.6490 },
            { origen: "Arenys de Mar", destino: "Mataró", coordOrigen: [41.579703, 2.549156], coordDestino: [41.539100, 2.444600], distancia: 11.3892 },
            { origen: "Calella", destino: "Mataró", coordOrigen: [41.613293, 2.657610], coordDestino: [41.539100, 2.444600], distancia: 25.9550 },
            { origen: "Malgrat de Mar", destino: "Mataró", coordOrigen: [41.645200, 2.741000], coordDestino: [41.539100, 2.444600], distancia: 31.8055 },
            { origen: "Santa Susanna", destino: "Mataró", coordOrigen: [41.635800, 2.707300], coordDestino: [41.539100, 2.444600], distancia: 27.6321 },
            { origen: "Cardedeu", destino: "Granollers", coordOrigen: [41.638517, 2.355841], coordDestino: [41.608000, 2.287400], distancia: 8.6849 },
            { origen: "Martorell", destino: "San Cugat del Vallès", coordOrigen: [41.474389, 1.930716], coordDestino: [41.472300, 2.085800], distancia: 20.7884 },
            { origen: "Sant Andreu de la Barca", destino: "San Cugat del Vallès", coordOrigen: [41.447400, 1.963100], coordDestino: [41.472300, 2.085800], distancia: 17.2068 },
            { origen: "Molins de Rei", destino: "San Cugat del Vallès", coordOrigen: [41.413809, 2.015963], coordDestino: [41.472300, 2.085800], distancia: 16.6915 },
            { origen: "Sant Vicenç dels Horts", destino: "San Cugat del Vallès", coordOrigen: [41.393800, 2.009100], coordDestino: [41.472300, 2.085800], distancia: 19.2129 },
            { origen: "Vilafranca del Penedés", destino: "Vilanova i la Geltrú", coordOrigen: [41.346383, 1.699521], coordDestino: [41.224199, 1.725633], distancia: 17.8530 },
            { origen: "Línea de la Concepción", destino: "Algeciras", coordOrigen: [36.162200, -5.346600], coordDestino: [36.130600, -5.446800], distancia: 21.4538 },
            { origen: "San Antonio de Benagéber", destino: "Valencia", coordOrigen: [39.561948, -0.500128], coordDestino: [39.470000, -0.376400], distancia: 16.8184 },
            { origen: "Alhaurín de la Torre", destino: "Málaga", coordOrigen: [36.662754, -4.562753], coordDestino: [36.720100, -4.414900], distancia: 19.8921 },
            { origen: "Arucas", destino: "Las Palmas de G.C.", coordOrigen: [28.119048, -15.521058], coordDestino: [28.125100, -15.428332], distancia: 13.0888 }
        ];

        const contenedorLista = document.getElementById('lista-rutas');
        let controlRuta = null;

        rutas.forEach((ruta) => {
            const li = document.createElement('li');
            li.className = 'p-4 hover:bg-blue-50 cursor-pointer transition-colors';
            li.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-semibold text-gray-800 text-sm">${ruta.origen} <span class="text-gray-400">→</span> ${ruta.destino}</p>
                        <p class="text-xs text-gray-500 mt-1">Ref: ${ruta.distancia} km</p>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            `;
            
            li.onclick = () => {
                if (controlRuta !== null) {
                    mapa.removeControl(controlRuta);
                }

                controlRuta = L.Routing.control({
                    waypoints: [
                        L.latLng(ruta.coordOrigen[0], ruta.coordOrigen[1]),
                        L.latLng(ruta.coordDestino[0], ruta.coordDestino[1])
                    ],
                    router: L.Routing.osrmv1({
                        serviceUrl: 'https://router.project-osrm.org/route/v1'
                    }),
                    show: false,
                    addWaypoints: false,
                    routeWhileDragging: false,
                    fitSelectedRoutes: true,
                    lineOptions: {
                        styles: [{color: '#3b82f6', opacity: 0.8, weight: 5}]
                    }
                }).addTo(mapa);
            };
            
            contenedorLista.appendChild(li);
        });
    </script>

</body>
</html>
